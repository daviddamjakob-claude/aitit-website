  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --base:        #0C0F0E;
      --surface-1:   #0F1A16;
      --surface-2:   #121F18;
      --surface-3:   #0A1510;
      --surface-1h:  #1E3D2C;
      --surface-2h:  #224535;
      --surface-3h:  #193325;
      --border:      #141A18;
      --border-card: #1E2E28;
      --muted-1:     #3A6655;
      --muted-2:     #2E4A3E;
      --mid:         #4A7A62;
      --accent-dim:  #4A8A6E;
      --hero-4:      #6A9A82;
      --accent:      #C8F0E0;
      --white:       #FFFFFF;
      --cta-text:    #0C1A16;
    }

    html { scroll-behavior: smooth; }
    body { background: var(--base); color: var(--white); }

    /* ── NAV ── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--base);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px max(80px, calc((100vw - 1280px) / 2 + 80px));
      border-bottom: 0.5px solid var(--border);
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      color: var(--white);
      display: flex;
      align-items: center;
    }
    .logo img {
      height: 64px;
      width: auto;
      display: block;
    }
    .logo-dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      margin-left: 7px;
      vertical-align: middle;
      flex-shrink: 0;
    }
    .footer-logo img {
      height: 52px;
      width: auto;
      display: block;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .nav-btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 7px 18px;
      border: 0.5px solid var(--accent);
      color: var(--accent);
      background: transparent;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .nav-btn:hover {
      background: var(--accent);
      color: var(--cta-text);
    }

    /* ── SECTION 1 — HERO ── */
    .s1 {
      padding: 72px max(80px, calc((100vw - 1280px) / 2 + 80px));
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-bottom: 0.5px solid var(--border);
    }
    .s1-line {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      line-height: 1.1;
      display: block;
      margin-bottom: 10px;
    }
    .s1-hero-link { text-decoration: none; }
    @media (hover: hover) {
      .s1-hero-link:hover {
        text-decoration: underline;
        text-underline-offset: 8px;
        text-decoration-color: var(--accent);
        text-decoration-thickness: 2px;
      }
    }
    .s1-line-last {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      line-height: 1.1;
      display: block;
      margin-top: 32px;
    }

    /* ── SECTION 2 — DISCIPLINES + PRICING ── */
    .s2 {
      padding: 72px max(80px, calc((100vw - 1280px) / 2 + 80px));
      border-bottom: 0.5px solid var(--border);
    }
    .s2-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--white);
      margin-bottom: 16px;
    }
    .s2-rule {
      width: 32px; height: 1px;
      background: var(--accent);
      margin-bottom: 18px;
    }
    .s2-typed-wrap {
      display: flex;
      align-items: center;
      min-height: 72px;
      margin-bottom: 48px;
    }
    .s2-typed {
      font-family: 'Syne', sans-serif;
      font-size: clamp(36px, 7vw, 60px);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      color: var(--accent);
      line-height: 1;
    }
    .cursor {
      display: inline-block;
      width: 4px;
      height: clamp(32px, 6vw, 54px);
      background: var(--accent);
      margin-left: 5px;
      vertical-align: middle;
      animation: blink 0.75s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* Grid */
    .offer-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .offer {
      border-radius: 6px;
      padding: clamp(20px, 3vw, 28px);
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: background 0.25s ease;
    }
    .offer-1 { background: var(--surface-1); }
    .offer-1:hover { background: var(--surface-1h); }
    .offer-2 { background: var(--surface-2); }
    .offer-2:hover { background: var(--surface-2h); }
    .offer-3 { background: var(--surface-3); }
    .offer-3:hover { background: var(--surface-3h); }

    .offer-name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(15px, 1.8vw, 18px);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: var(--white);
      margin-bottom: 20px;
    }
    .offer-bullets {
      flex: 1;
      margin-bottom: 24px;
    }
    .offer-bullet {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(12px, 1.3vw, 14px);
      color: var(--accent);
      font-weight: 500;
      line-height: 1.65;
      padding: 6px 0;
      border-bottom: 0.5px solid var(--border-card);
      display: flex;
      gap: 10px;
    }
    .offer-bullet:last-child { border-bottom: none; }
    .offer-bullet--price {
      color: var(--accent);
    }
    .dash {
      color: var(--accent-dim);
      flex-shrink: 0;
    }
    .offer-cta {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(12px, 1.3vw, 13px);
      font-weight: 500;
      padding: 10px 14px;
      border-radius: 3px;
      text-align: center;
      cursor: pointer;
      display: block;
      margin-top: auto;
      background: var(--accent);
      color: var(--cta-text);
      border: none;
      transition: background 0.2s;
    }
    .offer-cta:hover { background: var(--white); }

    /* ── FOOTER ── */
    .footer {
      padding: 64px max(80px, calc((100vw - 1280px) / 2 + 80px)) 40px;
      border-top: 0.5px solid var(--border);
    }
    .footer-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 40px;
      margin-bottom: 48px;
    }
    .footer-col-title {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 16px;
    }
    .footer-col-links {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .footer-col-links a {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: var(--muted-1);
      text-decoration: none;
      transition: color 0.15s;
      line-height: 1.4;
    }
    .footer-col-links a:hover { color: var(--accent); }
    .footer-col > div:first-child {
      height: 32px;
      display: flex;
      align-items: flex-end;
    }
    .footer-bottom {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding-top: 24px;
      border-top: 0.5px solid var(--border);
    }
    .footer-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      color: var(--muted-1);
    }
    @media (max-width: 900px) {
      .footer-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .footer-grid { grid-template-columns: 1fr; }
      .footer { padding: 48px 24px 32px; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .nav    { padding: 16px 40px; }
      .s1     { padding: 60px 40px; }
      .s2     { padding: 60px 40px; }
      .footer { padding: 10px 40px; }
      .offer-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .nav    { padding: 14px 24px; }
      .s1     { padding: 52px 24px; }
      .s2     { padding: 52px 24px; }
      .footer { padding: 10px 24px; }
    }
    @media (min-width: 1440px) {
      .offer-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <span class="logo"></span>
    <div class="nav-right">
      <a href="https://daviddamjakob-claude.github.io/aitit-training-OS/" class="nav-btn" target="_blank" rel="noopener">training os</a>
      <button class="nav-btn">get in touch</button>
    </div>
  </nav>

  <section class="s1">
    <span class="s1-line" style="font-size:clamp(13px,1.7vw,16px);color:#3A6655;">Nothing is impossible.</span>
    <span class="s1-line" style="font-size:clamp(16px,2.3vw,21px);color:#2E4A3E;">Getting there is a journey.</span>
    <span class="s1-line" style="font-size:clamp(20px,3.0vw,27px);color:#3A6655;">Every race has a finish line.</span>
    <span class="s1-line" style="font-size:clamp(25px,3.9vw,35px);color:#6A9A82;">Winners endure the pain.</span>
    <a href="#s2" class="s1-line-last s1-hero-link" style="font-size:clamp(36px,7vw,64px);color:#FFFFFF;">All it takes is training.</a>
  </section>

  <section class="s2" id="s2">
    <div class="s2-label">Giving you the tooling you want for your next</div>
    <div class="s2-rule"></div>
    <div class="s2-typed-wrap">
      <span class="s2-typed" id="typed"></span>
      <span class="cursor"></span>
    </div>

    <div class="offer-grid" id="offer-grid"></div>
  </section>

  <footer class="footer">
    <div class="footer-grid" id="footer-grid"></div>
    <div class="footer-bottom">
      <span class="footer-text">© 2026</span>
    </div>
  </footer>

  <script>
    (function () {
      const SPACE  = '9znjatyadlyr';
      const TOKEN  = 'V_HbgQqB8xCNo7NdczEKvYnrgB_0AVhDr2uJwLadMdA';
      const API        = `https://cdn.contentful.com/spaces/${SPACE}/entries?content_type=offer&order=fields.order&access_token=${TOKEN}`;
      const LOGOS_ENTRY = '5DmqGLkU6rkbwCHVYXW0r3';

      async function loadOffers() {
        const res  = await fetch(API);
        const data = await res.json();
        const grid = document.getElementById('offer-grid');

        grid.innerHTML = data.items.map((item, i) => {
          const { heading, bullets, ctaLabel } = item.fields;
          const list = Array.isArray(bullets)
            ? bullets
            : String(bullets).split('\n').filter(Boolean);

          const bulletsHtml = list.map((b, bi) =>
            `<div class="offer-bullet${bi === 0 ? ' offer-bullet--price' : ''}">` +
            `<span class="dash">—</span>${b}</div>`
          ).join('');

          return `
            <div class="offer offer-${i + 1}">
              <div class="offer-name">${heading}</div>
              <div class="offer-bullets">${bulletsHtml}</div>
              <button class="offer-cta">${ctaLabel}</button>
            </div>`;
        }).join('');
      }

      loadOffers().catch(err => console.error('Contentful fetch failed:', err));

      async function loadLogos() {
        const res  = await fetch(`https://cdn.contentful.com/spaces/${SPACE}/entries?sys.id=${LOGOS_ENTRY}&include=1&access_token=${TOKEN}`);
        const data = await res.json();
        if (!data.items || !data.items.length) return;

        const fields  = data.items[0].fields;
        const assets  = (data.includes && data.includes.Asset) || [];
        const assetMap = {};
        assets.forEach(a => { assetMap[a.sys.id] = 'https:' + a.fields.file.url; });

        if (fields.headerLogo) {
          const url = assetMap[fields.headerLogo.sys.id];
          if (url) {
            const nav = document.querySelector('.logo');
            nav.innerHTML = `<img src="${url}" alt="all it takes is training">`;
          }
        }
        if (fields.footerLogo) {
          const url = assetMap[fields.footerLogo.sys.id];
          if (url) {
            document.getElementById('footer-logo').innerHTML = `<img src="${url}" alt="all it takes is training">`;
          }
        }
      }

      loadLogos().catch(err => console.error('Logo fetch failed:', err));

      async function loadFooter() {
        const res  = await fetch(`https://cdn.contentful.com/spaces/${SPACE}/entries?content_type=footerColumn&order=fields.order&include=2&access_token=${TOKEN}`);
        const data = await res.json();
        const grid = document.getElementById('footer-grid');
        if (!grid || !data.items) return;

        const assetMap = {};
        ((data.includes && data.includes.Asset) || []).forEach(a => {
          assetMap[a.sys.id] = 'https:' + a.fields.file.url;
        });
        const entryMap = {};
        ((data.includes && data.includes.Entry) || []).forEach(e => {
          entryMap[e.sys.id] = e.fields;
        });

        grid.innerHTML = data.items.map(col => {
          const links = (col.fields.links || []).map(ref => {
            const f = entryMap[ref.sys.id];
            if (!f) return '';
            const href = f.document ? assetMap[f.document.sys.id] : (f.url || '#');
            const target = f.document ? ' target="_blank" rel="noopener"' : '';
            return `<li><a href="${href}"${target}>${f.label}</a></li>`;
          }).join('');
          return `<div class="footer-col">
            <div class="footer-col-title">${col.fields.title}</div>
            <ul class="footer-col-links">${links}</ul>
          </div>`;
        }).join('');
      }

      loadFooter().catch(err => console.error('Footer fetch failed:', err));
    })();

    (function () {
      const words = ['IronMan.', 'Marathon.', 'Hyrox.'];
      let wi = 0, ci = 0, deleting = false, pause = 0;
      const el = document.getElementById('typed');

      function tick() {
        const word = words[wi];
        if (pause > 0) { pause--; setTimeout(tick, 80); return; }
        if (!deleting) {
          el.textContent = word.slice(0, ci + 1);
          ci++;
          if (ci === word.length) { pause = 24; deleting = true; }
        } else {
          el.textContent = word.slice(0, ci - 1);
          ci--;
          if (ci === 0) { deleting = false; wi = (wi + 1) % words.length; pause = 5; }
        }
        setTimeout(tick, deleting ? 52 : 90);
      }
      setTimeout(tick, 700);
    })();
  </script>

</body>
</html>
